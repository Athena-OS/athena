
name: Vulcano
on:
  pull_request:
    branches: [ master ]
    paths:
      - 'src/**/PKGBUILD'
permissions:
  contents: read
  pull-requests: write
jobs:
  labeling:
    runs-on: ubuntu-latest
    steps:
      - name: Labeling
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: '1.has: package'
  pkgcheck:
    runs-on: ubuntu-latest
    container:
      image: athenaos/base-devel:latest
      options: --privileged 
    steps:
      - name: Install dependencies
        run: |
          pacman -Syyu --noconfirm pkgcheck-arch git
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Trust workspace directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Check Styling
        run: |
          CHANGED_PKGBUILDS=$(git diff --name-only --diff-filter=ACMRT \
            HEAD^1...HEAD \
            | grep 'src/.*/PKGBUILD$' || true)
          for FILE in "${CHANGED_PKGBUILDS[@]}"; do
            if [[ $(basename "$FILE") == "PKGBUILD" ]]; then
              echo "Checking $FILE..."
              pkgcheck "$FILE"
            fi
          done
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Build Package
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}   # or a fine-grained PAT
        run: |
          set -euo pipefail
          umask 077
          printf '%s' "$GH_TOKEN" > /tmp/ghtoken

          mapfile -t CHANGED < <(git diff --name-only --diff-filter=ACMRT \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            | grep 'src/.*/PKGBUILD$' || true)

          for FILE in "${CHANGED[@]}"; do
            [[ -n "$FILE" ]] || continue
            podman build --build-arg PKGDIR="$(dirname "$FILE")" \
              -t builder -f vulcano/Dockerfile .
            podman run --rm \
              -v /tmp/ghtoken:/run/secrets/ghtoken:ro \
              builder
          done

          shred -u /tmp/ghtoken
