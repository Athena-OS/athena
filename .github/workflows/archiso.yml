name: Build ArchISO Stable
on:
  # push:
  workflow_dispatch:
  #schedule:
  #   - cron:  '0 0 */7 * *'
  
jobs:
  build:
    env:
      ATHENA_ID: 'athenaos'
      ATHENA_VERSION: 'rolling'
      ISO_VERSION: 'live' # It must be the same on profiledef.sh and build-iso.sh
      ISO_ARCHITECTURE: 'x86_64'
    runs-on: ubuntu-latest
    container:
      image: athenaos/base-devel:latest
      options: --privileged 
    steps:
      - name: Checkout files
        uses: actions/checkout@v6
  
      - name: Init Keys
        run: | 
          rm -rf /etc/pacman.d/gnupg
          pacman-key --init
          pacman-key --populate
          pacman -Syy

      - name: Install rate-mirrors
        run: pacman -Syyu --noconfirm rate-mirrors

      - name: Set fastest mirrors
        run: |
          rate-mirrors --concurrency 40 --disable-comments --allow-root --save /etc/pacman.d/mirrorlist arch || true
          rate-mirrors --concurrency 40 --disable-comments --allow-root --save /etc/pacman.d/blackarch-mirrorlist blackarch
          rate-mirrors --concurrency 40 --disable-comments --allow-root --save /etc/pacman.d/chaotic-mirrorlist chaotic-aur

      - name: Install dependencies
        run: pacman -Syyu --noconfirm archiso aws-cli curl edk2-ovmf git github-cli gnupg jq qemu-desktop rsync wget # Install also optional deps for archiso
        
      - name: Build ArchISO
        run: |
          cd scripts
          ./build-iso.sh
          
      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          REMOTE_PREFIX="s3://$R2_BUCKET/iso"

          # Upload package files and their signatures
          for file in $HOME/Athena-Out/*.iso*; do
            [ -f "$file" ] || continue
            echo "Uploading $(basename $file)..."
            aws s3 cp "$file" "$REMOTE_PREFIX/$(basename $file)" \
              --endpoint-url "$R2_ENDPOINT"
          done

      - name: Purge edge cache
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          REPO_BASE_URL="https://hub.athenaos.org/iso"
          URLS=()

          # Add every uploaded package to the purge list
          for f in $HOME/Athena-Out/*.iso*; do
            [ -f "$f" ] || continue
            URLS+=("$REPO_BASE_URL/$(basename $f)")
          done

          # Cloudflare allows up to 30 URLs per call; build JSON and POST
          JSON_URLS=$(printf '%s\n' "${URLS[@]}" | jq -R . | jq -s .)
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"files\": $JSON_URLS}" | jq .

      #- name: Upload to GitHub Release
      #  env:
      #    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #  run: |
      #    for f in $(find $HOME/Athena-Out -name '*.iso*'); do
      #      gh release upload v26.03 $f --clobber --repo "$GITHUB_REPOSITORY"
      #    done
